services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: waze-oracle-db
    environment:
      ORACLE_PWD: WazeIntel2026  # pragma: allowlist secret
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/init_oracle.sql:/opt/oracle/scripts/startup/init.sql
    healthcheck:
      test: ["CMD", "sqlplus", "-s", "sys/WazeIntel2026@//localhost:1521/FREEPDB1 as sysdba", "<<< 'SELECT 1 FROM DUAL;'"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  oracle-data:
