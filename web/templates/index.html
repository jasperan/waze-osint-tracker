<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Traffic Intelligence</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2306080c'/><circle cx='50' cy='50' r='25' fill='none' stroke='%23e8a817' stroke-width='3'/><circle cx='50' cy='50' r='8' fill='%23e8a817'/></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- GridStack CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css" />

    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
    <!-- Top Toolbar -->
    <div class="top-toolbar" id="top-toolbar">
        <div class="toolbar-left">
            <h1 class="app-title">Traffic Intelligence</h1>
            <span class="app-subtitle">GLOBAL REAL-TIME MONITOR</span>
        </div>
        <div class="toolbar-center">
            <div class="deck-selector" id="deck-selector"></div>
        </div>
        <div class="toolbar-right">
            <div class="time-controls" id="time-controls"></div>
            <div class="connection-badge">
                <span class="status-dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <div class="map-layer">
            <div id="map"></div>
            <div class="layer-bar" id="layer-bar"></div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="status-text">Initializing...</span>
            </div>

            <!-- Legend -->
            <div class="legend" id="map-legend">
                <h4>Density</h4>
                <div class="legend-gradient"></div>
                <div class="legend-labels">
                    <span>Low</span>
                    <span>High</span>
                </div>
            </div>
        </div>
        <div class="widget-area">
            <div class="grid-stack" id="widget-grid"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- GridStack JS -->
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.js"></script>

    <!-- Dashboard JS -->
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
