<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze Madrid Logger - Event Map</title>

    <!-- Favicon (data URI to avoid 404) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #0f3460;
        }

        .sidebar h1 {
            font-size: 1.4rem;
            color: #e94560;
            margin-bottom: 5px;
        }

        .sidebar .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }

        /* Stats Panel */
        .stats-panel {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .stats-panel h3 {
            font-size: 0.9rem;
            color: #e94560;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
            color: #00d9ff;
        }

        /* Filters */
        .filters {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .filters h3 {
            font-size: 0.9rem;
            color: #e94560;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #eee;
            font-size: 0.9rem;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        /* Type breakdown */
        .type-breakdown {
            margin-top: 15px;
        }

        .type-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .type-item:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .type-item.active {
            background: rgba(233, 69, 96, 0.2);
        }

        .type-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .type-name {
            flex: 1;
            font-size: 0.85rem;
        }

        .type-count {
            font-size: 0.85rem;
            color: #888;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Event Details Popup */
        .event-popup {
            min-width: 200px;
        }

        .event-popup h4 {
            color: #e94560;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .event-popup .detail {
            font-size: 0.85rem;
            color: #333;
            margin: 4px 0;
        }

        .event-popup .detail strong {
            color: #0f3460;
        }

        /* Loading overlay */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.9);
            padding: 20px 40px;
            border-radius: 8px;
            z-index: 1000;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 0.8rem;
        }

        .legend h4 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .legend-gradient {
            width: 150px;
            height: 15px;
            background: linear-gradient(to right, #22c55e, #84cc16, #eab308, #f97316, #ef4444);
            border-radius: 3px;
            margin-bottom: 5px;
        }

        .legend-labels {
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            background: #e94560;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            background: #ff6b6b;
        }

        .btn-secondary {
            background: #0f3460;
        }

        .btn-secondary:hover {
            background: #1a4f8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h1>Waze Madrid Logger</h1>
            <p class="subtitle">Traffic Event Surveillance Map</p>

            <!-- Stats Panel -->
            <div class="stats-panel">
                <h3>Statistics</h3>
                <div class="stat-row">
                    <span class="stat-label">Total Events</span>
                    <span class="stat-value" id="stat-total">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Unique Users</span>
                    <span class="stat-value" id="stat-users">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Time Range</span>
                    <span class="stat-value" id="stat-time">-</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <h3>Filters</h3>

                <div class="filter-group">
                    <label>Time Range</label>
                    <select id="filter-time">
                        <option value="">All Time</option>
                        <option value="1">Last Hour</option>
                        <option value="6">Last 6 Hours</option>
                        <option value="24">Last 24 Hours</option>
                        <option value="168">Last Week</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Event Type</label>
                    <div class="type-breakdown" id="type-filters">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <button class="btn" onclick="applyFilters()">Apply Filters</button>
                <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            </div>

            <!-- View Controls -->
            <div class="filters">
                <h3>View Options</h3>
                <div class="filter-group">
                    <label>
                        <input type="checkbox" id="show-heatmap" checked> Show Heatmap
                    </label>
                </div>
                <div class="filter-group">
                    <label>
                        <input type="checkbox" id="show-markers"> Show Markers
                    </label>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>

            <!-- Legend -->
            <div class="legend">
                <h4>Event Density</h4>
                <div class="legend-gradient"></div>
                <div class="legend-labels">
                    <span>Low</span>
                    <span>High</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Heatmap -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // Initialize map centered on Madrid
        const map = L.map('map').setView([40.4168, -3.7038], 13);

        // Dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap, &copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        // Layers
        let heatLayer = null;
        let markersLayer = L.layerGroup().addTo(map);

        // Event type colors
        const typeColors = {
            'POLICE': '#3498db',
            'JAM': '#e74c3c',
            'HAZARD': '#f39c12',
            'ROAD_CLOSED': '#9b59b6',
            'ACCIDENT': '#e91e63',
            'CONSTRUCTION': '#ff9800'
        };

        // Load initial data
        loadStats();
        loadTypes();
        loadHeatmap();

        // Load statistics
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();

                document.getElementById('stat-total').textContent =
                    stats.total_events.toLocaleString();
                document.getElementById('stat-users').textContent =
                    stats.unique_users.toLocaleString();

                if (stats.first_event && stats.last_event) {
                    const first = stats.first_event.substring(0, 10);
                    const last = stats.last_event.substring(0, 10);
                    document.getElementById('stat-time').textContent =
                        first === last ? first : `${first} - ${last}`;
                }
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        // Load event types for filter
        async function loadTypes() {
            try {
                const res = await fetch('/api/types');
                const types = await res.json();

                const container = document.getElementById('type-filters');
                container.innerHTML = '';

                types.forEach(t => {
                    const color = typeColors[t.type] || '#888';
                    const item = document.createElement('div');
                    item.className = 'type-item';
                    item.dataset.type = t.type;
                    item.innerHTML = `
                        <div class="type-dot" style="background: ${color}"></div>
                        <span class="type-name">${t.type}</span>
                        <span class="type-count">${t.count}</span>
                    `;
                    item.onclick = () => toggleTypeFilter(item);
                    container.appendChild(item);
                });
            } catch (err) {
                console.error('Failed to load types:', err);
            }
        }

        // Toggle type filter
        function toggleTypeFilter(item) {
            item.classList.toggle('active');
        }

        // Load heatmap data
        async function loadHeatmap(type = null, since = null) {
            try {
                let url = '/api/heatmap?';
                if (type) url += `type=${type}&`;
                if (since) url += `since=${since}&`;

                const res = await fetch(url);
                const data = await res.json();

                // Remove old heatmap
                if (heatLayer) {
                    map.removeLayer(heatLayer);
                }

                // Create new heatmap
                if (data.length > 0) {
                    const maxIntensity = Math.max(...data.map(d => d[2]));
                    heatLayer = L.heatLayer(data, {
                        radius: 30,
                        blur: 20,
                        maxZoom: 17,
                        max: maxIntensity || 1,
                        minOpacity: 0.4,
                        gradient: {
                            0.0: '#22c55e',  // Green
                            0.25: '#84cc16', // Lime
                            0.5: '#eab308',  // Yellow
                            0.75: '#f97316', // Orange
                            1.0: '#ef4444'   // Red
                        }
                    });

                    if (document.getElementById('show-heatmap').checked) {
                        heatLayer.addTo(map);
                    }
                }
            } catch (err) {
                console.error('Failed to load heatmap:', err);
            }
        }

        // Load markers
        async function loadMarkers(type = null, since = null) {
            try {
                let url = '/api/events?limit=500&';
                if (type) url += `type=${type}&`;
                if (since) url += `since=${since}&`;

                const res = await fetch(url);
                const events = await res.json();

                // Clear old markers
                markersLayer.clearLayers();

                events.forEach(event => {
                    const color = typeColors[event.type] || '#888';

                    const marker = L.circleMarker([event.latitude, event.longitude], {
                        radius: 6,
                        fillColor: color,
                        color: '#fff',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    });

                    marker.bindPopup(`
                        <div class="event-popup">
                            <h4>${event.type}</h4>
                            <div class="detail"><strong>User:</strong> ${event.username}</div>
                            <div class="detail"><strong>Time:</strong> ${event.timestamp.substring(0, 19)}</div>
                            <div class="detail"><strong>Location:</strong> ${event.latitude.toFixed(4)}, ${event.longitude.toFixed(4)}</div>
                            ${event.subtype ? `<div class="detail"><strong>Subtype:</strong> ${event.subtype}</div>` : ''}
                        </div>
                    `);

                    markersLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Failed to load markers:', err);
            }
        }

        // Apply filters
        function applyFilters() {
            const since = document.getElementById('filter-time').value || null;

            // Get selected types
            const activeTypes = document.querySelectorAll('.type-item.active');
            let type = null;
            if (activeTypes.length === 1) {
                type = activeTypes[0].dataset.type;
            }

            loadHeatmap(type, since);
            if (document.getElementById('show-markers').checked) {
                loadMarkers(type, since);
            }
            loadStats();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('filter-time').value = '';
            document.querySelectorAll('.type-item.active').forEach(item => {
                item.classList.remove('active');
            });
            applyFilters();
        }

        // Toggle heatmap visibility
        document.getElementById('show-heatmap').addEventListener('change', function() {
            if (this.checked && heatLayer) {
                heatLayer.addTo(map);
            } else if (heatLayer) {
                map.removeLayer(heatLayer);
            }
        });

        // Toggle markers visibility
        document.getElementById('show-markers').addEventListener('change', function() {
            if (this.checked) {
                loadMarkers();
                markersLayer.addTo(map);
            } else {
                markersLayer.clearLayers();
            }
        });

        // Auto-refresh every 5 minutes
        setInterval(() => {
            loadStats();
            applyFilters();
        }, 300000);
    </script>
</body>
</html>
