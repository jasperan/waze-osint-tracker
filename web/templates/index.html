<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Traffic Intelligence</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2306080c'/><circle cx='50' cy='50' r='25' fill='none' stroke='%23e8a817' stroke-width='3'/><circle cx='50' cy='50' r='8' fill='%23e8a817'/></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #06080c;
            --bg-surface: #0c1017;
            --bg-elevated: #131820;
            --primary: #e8a817;
            --primary-dim: #b8860b;
            --secondary: #3b82f6;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-yellow: #fbbf24;
            --accent-orange: #fb923c;
            --text-primary: #e8e4dc;
            --text-secondary: #8b9ab5;
            --text-muted: #4e5d73;
            --border: rgba(232, 168, 23, 0.08);
            --border-highlight: rgba(232, 168, 23, 0.35);
            --glass: rgba(232, 168, 23, 0.02);
            --glass-border: rgba(232, 168, 23, 0.08);
            --glow-primary: 0 0 20px rgba(232, 168, 23, 0.12);
            --glow-secondary: 0 0 20px rgba(59, 130, 246, 0.12);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-surface);
            background-image:
                linear-gradient(rgba(232, 168, 23, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 168, 23, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            padding: 20px 16px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            transition: transform 0.3s ease, width 0.3s ease;
            position: relative;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar.collapsed {
            transform: translateX(-320px);
            width: 0;
            padding: 0;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: absolute;
            left: 320px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            color: var(--primary);
            cursor: pointer;
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .sidebar.collapsed + .sidebar-toggle,
        .sidebar.collapsed ~ .sidebar-toggle {
            left: 0;
        }

        /* Header */
        .sidebar-header {
            margin-bottom: 4px;
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.01em;
            text-shadow: 0 0 30px rgba(232, 168, 23, 0.25);
        }

        .sidebar-header .subtitle {
            font-size: 0.65rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-top: 4px;
        }

        /* Panels */
        .panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 16px;
            position: relative;
            border-top: 1px solid rgba(232, 168, 23, 0.25);
        }

        .panel h3 {
            font-size: 0.6rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .panel h3::before {
            content: '';
            width: 3px;
            height: 12px;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(232, 168, 23, 0.4);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .stat-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
            margin-right: 8px;
        }

        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
            text-align: right;
            text-shadow: 0 0 12px rgba(232, 168, 23, 0.3);
        }

        /* Filters */
        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .filter-group select,
        .filter-group input[type="date"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Instrument Sans', sans-serif;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .filter-group select:hover,
        .filter-group input:hover {
            border-color: var(--border-highlight);
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        /* Type filters */
        .type-filters {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .type-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .type-group-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .type-expand {
            width: 20px;
            height: 20px;
            padding: 0;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .type-expand:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .type-expand.expanded {
            background: rgba(232, 168, 23, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .type-chip {
            padding: 8px 12px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .type-chip:hover {
            border-color: var(--border-highlight);
            background: var(--bg-elevated);
        }

        .type-chip.active {
            background: rgba(232, 168, 23, 0.06);
            border-color: var(--primary);
            color: var(--primary);
        }

        .type-chip .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .type-chip .count {
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            margin-left: auto;
        }

        .subtypes-container {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-left: 26px;
            margin-top: 4px;
            padding-left: 12px;
            border-left: 1px solid var(--border);
        }

        .subtypes-container.expanded {
            display: flex;
        }

        .subtype-chip {
            padding: 6px 10px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subtype-chip:hover {
            border-color: var(--border-highlight);
        }

        .subtype-chip.active {
            background: rgba(232, 168, 23, 0.06);
            border-color: var(--primary);
            color: var(--primary);
        }

        .subtype-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0.8;
        }

        .subtype-chip .count {
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            margin-left: auto;
        }

        /* Buttons */
        .btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dim));
            border: none;
            border-radius: 4px;
            color: var(--bg-deep);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Instrument Sans', sans-serif;
            transition: all 0.2s;
            box-shadow: var(--glow-primary);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(232, 168, 23, 0.3);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.75rem;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            box-shadow: none;
        }

        .btn-ghost:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(232, 168, 23, 0.05);
            transform: none;
            box-shadow: none;
        }

        /* Checkbox */
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            gap: 10px;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .checkbox-label:hover {
            color: var(--text-primary);
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Live Feed */
        .live-feed {
            flex: 1;
            min-height: 180px;
            max-height: 280px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .feed-header h3 {
            margin: 0;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-muted);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .feed-items {
            flex: 1;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .feed-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            background: var(--bg-deep);
            border-radius: 4px;
            border-left: 3px solid var(--primary);
            animation: slideIn 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feed-item.clickable {
            cursor: pointer;
            transition: all 0.2s;
        }

        .feed-item.clickable:hover {
            background: var(--bg-elevated);
            border-left-color: var(--text-primary);
        }

        .feed-item.new {
            animation: highlight 1s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes highlight {
            0% { background: rgba(232, 168, 23, 0.15); }
            100% { background: var(--bg-deep); }
        }

        .feed-item .type {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .feed-item .location {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .feed-item .time {
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 0.8rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        #status-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 30px;
            right: 16px;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 14px 16px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 0.75rem;
        }

        .legend h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 0.65rem;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .legend-gradient {
            width: 120px;
            height: 8px;
            background: linear-gradient(to right, #1a1008, #6b4310, #c9901a, var(--primary));
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .legend-labels {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Map scan-line overlay */
        .map-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(6, 8, 12, 0.03) 2px,
                rgba(6, 8, 12, 0.03) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        /* Staggered panel load animation */
        .panel {
            animation: panelReveal 0.4s ease both;
        }
        .panel:nth-child(1) { animation-delay: 0.05s; }
        .panel:nth-child(2) { animation-delay: 0.1s; }
        .panel:nth-child(3) { animation-delay: 0.15s; }
        .panel:nth-child(4) { animation-delay: 0.2s; }
        .panel:nth-child(5) { animation-delay: 0.25s; }
        .panel:nth-child(6) { animation-delay: 0.3s; }

        @keyframes panelReveal {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .leaflet-popup-tip {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
        }

        .event-popup {
            font-family: 'Instrument Sans', sans-serif;
            color: var(--text-primary);
        }

        .event-popup h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .event-popup .detail {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 6px 0;
        }

        .event-popup .detail strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Leaderboard */
        .leaderboard-panel {
            min-height: 140px;
        }

        .leaderboard {
            max-height: 180px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: var(--bg-deep);
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .leaderboard-item:hover {
            background: var(--bg-elevated);
            border-color: var(--border-highlight);
        }

        .leaderboard-rank {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .leaderboard-rank.gold {
            background: linear-gradient(135deg, #ffd700, #ffb800);
            color: #1a1a1a;
        }

        .leaderboard-rank.silver {
            background: linear-gradient(135deg, #e0e0e0, #b8b8b8);
            color: #1a1a1a;
        }

        .leaderboard-rank.bronze {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: #1a1a1a;
        }

        .leaderboard-rank.normal {
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .leaderboard-username {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .leaderboard-count {
            color: var(--primary);
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            margin-left: 12px;
        }

        /* User search */
        #user-search {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Instrument Sans', sans-serif;
            transition: all 0.2s;
        }

        #user-search::placeholder {
            color: var(--text-muted);
        }

        #user-search:hover {
            border-color: var(--border-highlight);
        }

        #user-search:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 100;
        }

        .user-option {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .user-option:hover {
            background: var(--bg-elevated);
        }

        .user-option:last-child {
            border-bottom: none;
        }

        .user-option .count {
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
        }

        .selected-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(232, 168, 23, 0.06);
            border: 1px solid var(--border-highlight);
            border-radius: 4px;
            padding: 10px 12px;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .selected-user span {
            color: var(--primary);
            font-weight: 500;
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-clear:hover {
            color: var(--accent-red);
        }

        /* Auto-follow info */
        .auto-follow-info {
            font-size: 0.7rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-muted);
            margin-top: 4px;
            padding-left: 26px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Leaflet overrides */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3) !important;
        }

        .leaflet-control-zoom a {
            background: var(--bg-surface) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            width: 36px !important;
            height: 36px !important;
            line-height: 36px !important;
            font-size: 18px !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--bg-elevated) !important;
            color: var(--primary) !important;
        }

        .leaflet-control-zoom-in {
            border-radius: 4px 4px 0 0 !important;
        }

        .leaflet-control-zoom-out {
            border-radius: 0 0 4px 4px !important;
            border-top: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Traffic Intelligence</h1>
                <p class="subtitle">Global Real-time Monitor</p>
            </div>

            <!-- Stats -->
            <div class="panel">
                <h3>Statistics</h3>
                <div class="stat-row">
                    <span class="stat-label">Total Events</span>
                    <span class="stat-value" id="stat-total">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Unique Users</span>
                    <span class="stat-value" id="stat-users">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Date Range</span>
                    <span class="stat-value" id="stat-time">—</span>
                </div>
            </div>

            <!-- Leaderboard -->
            <div class="panel leaderboard-panel">
                <h3>Top Contributors</h3>
                <div class="leaderboard" id="leaderboard">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Filters -->
            <div class="panel">
                <h3>Filters</h3>

                <div class="filter-group">
                    <label>Region</label>
                    <select id="filter-region" onchange="onFilterChange()">
                        <option value="">All Regions</option>
                        <option value="europe">Europe</option>
                        <option value="americas">Americas</option>
                        <option value="asia">Asia</option>
                        <option value="oceania">Oceania</option>
                        <option value="africa">Africa</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Time Range</label>
                    <select id="filter-time" onchange="onFilterChange()">
                        <option value="">All Data</option>
                        <option value="1">Last Hour</option>
                        <option value="6">Last 6 Hours</option>
                        <option value="24">Last 24 Hours</option>
                        <option value="168">Last Week</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>

                <div class="filter-group" id="date-range-group" style="display: none;">
                    <label>From</label>
                    <input type="date" id="filter-date-from" onchange="onFilterChange()">
                    <label style="margin-top: 8px;">To</label>
                    <input type="date" id="filter-date-to" onchange="onFilterChange()">
                </div>

                <div class="filter-group">
                    <label>Event Type</label>
                    <div class="type-filters" id="type-filters">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Track User</label>
                    <div style="position: relative;">
                        <input type="text" id="user-search" placeholder="Search username..."
                               autocomplete="off" oninput="searchUsers(this.value)" onfocus="showUserDropdown()"
                               onkeydown="if(event.key==='Enter'){event.preventDefault();const v=this.value.trim();if(v)selectUser(v);}">
                        <div id="user-dropdown" class="user-dropdown" style="display: none;">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    <div id="selected-user" class="selected-user" style="display: none;">
                        <span id="selected-user-name"></span>
                        <button class="btn-clear" onclick="clearUserFilter()">&times;</button>
                    </div>
                </div>

                <div style="margin-top: 12px;">
                    <button class="btn btn-ghost btn-small" onclick="resetFilters()">Reset All</button>
                </div>
            </div>

            <!-- Display Options -->
            <div class="panel">
                <h3>Display</h3>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-heatmap" checked onchange="toggleHeatmap()">
                        Heatmap Layer
                    </label>
                </div>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-markers" onchange="toggleMarkers()">
                        Event Markers
                    </label>
                </div>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="auto-follow" checked>
                        Auto-Follow Events
                    </label>
                    <div class="auto-follow-info" id="auto-follow-info">
                        Teleports every 10s
                    </div>
                </div>
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="sound-enabled">
                        Sound Notifications
                    </label>
                </div>
            </div>

            <!-- Live Feed -->
            <div class="panel live-feed">
                <div class="feed-header">
                    <h3>Live Feed</h3>
                    <div class="live-indicator">
                        <span class="live-dot"></span>
                        <span id="connection-status">Connecting...</span>
                    </div>
                </div>
                <div class="feed-items" id="feed-items">
                    <!-- Populated by SSE -->
                </div>
            </div>
        </div>

        <!-- Sidebar Toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="status-text">Initializing...</span>
            </div>

            <!-- Legend -->
            <div class="legend">
                <h4>Density</h4>
                <div class="legend-gradient"></div>
                <div class="legend-labels">
                    <span>Low</span>
                    <span>High</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // Map initialization
        const map = L.map('map', { zoomControl: false }).setView([45, 10], 4);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '',
            maxZoom: 19,
            opacity: 0.8
        }).addTo(map);

        // Layers
        let heatLayer = null;
        let markersLayer = L.layerGroup().addTo(map);

        // Current filter state
        let currentFilters = {
            type: null,
            subtype: null,
            since: null,
            dateFrom: null,
            dateTo: null,
            user: null,
            region: null
        };

        // User search debounce timer
        let userSearchTimer = null;

        // Event type colors (cyber theme)
        const typeColors = {
            'POLICE': '#3b82f6',      // Blue
            'JAM': '#f97316',          // Orange
            'HAZARD': '#facc15',       // Yellow
            'ROAD_CLOSED': '#8b5cf6',  // Violet
            'ACCIDENT': '#ef4444',     // Red
            'CONSTRUCTION': '#64748b'  // Slate
        };

        // Auto-follow throttling (teleport max once per 10 seconds)
        let lastTeleportTime = 0;
        const TELEPORT_INTERVAL = 10000; // 10 seconds
        let pendingTeleport = null;

        // Sound notification
        const notificationSound = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU' + 'tvT18'.repeat(100));

        function playNotificationSound() {
            const soundEnabled = document.getElementById('sound-enabled');
            if (soundEnabled && soundEnabled.checked) {
                notificationSound.volume = 0.3;
                notificationSound.play().catch(() => {}); // Ignore autoplay errors
            }
        }

        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            sidebar.classList.toggle('collapsed');
            toggle.textContent = sidebar.classList.contains('collapsed') ? '☰' : '×';
        }

        // Load statistics
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('stat-total').textContent = stats.total_events.toLocaleString();
                document.getElementById('stat-users').textContent = stats.unique_users.toLocaleString();
                if (stats.first_event && stats.last_event) {
                    const first = stats.first_event.substring(0, 7);
                    const last = stats.last_event.substring(0, 7);
                    document.getElementById('stat-time').textContent = first === last ? first : `${first} — ${last}`;
                }
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        // Load event types for filter
        async function loadTypes() {
            try {
                const res = await fetch('/api/types');
                const types = await res.json();
                const container = document.getElementById('type-filters');
                container.innerHTML = '';

                types.forEach(t => {
                    const color = typeColors[t.type] || '#64748b';
                    const hasSubtypes = t.subtypes && t.subtypes.length > 0;

                    // Create type group container
                    const group = document.createElement('div');
                    group.className = 'type-group';

                    // Create header with expand button and type chip
                    const header = document.createElement('div');
                    header.className = 'type-group-header';

                    // Expand button (only if has subtypes)
                    if (hasSubtypes) {
                        const expandBtn = document.createElement('button');
                        expandBtn.className = 'type-expand';
                        expandBtn.innerHTML = '▶';
                        expandBtn.dataset.type = t.type;
                        expandBtn.onclick = (e) => {
                            e.stopPropagation();
                            toggleSubtypes(expandBtn);
                        };
                        header.appendChild(expandBtn);
                    }

                    // Type chip
                    const chip = document.createElement('div');
                    chip.className = 'type-chip';
                    chip.dataset.type = t.type;
                    chip.innerHTML = `<span class="dot" style="background: ${color}"></span>${t.type}<span class="count">${t.count.toLocaleString()}</span>`;
                    chip.onclick = () => selectType(chip);
                    header.appendChild(chip);

                    group.appendChild(header);

                    // Subtypes container
                    if (hasSubtypes) {
                        const subtypesContainer = document.createElement('div');
                        subtypesContainer.className = 'subtypes-container';
                        subtypesContainer.dataset.parentType = t.type;

                        t.subtypes.forEach(st => {
                            const subChip = document.createElement('div');
                            subChip.className = 'subtype-chip';
                            subChip.dataset.type = t.type;
                            subChip.dataset.subtype = st.subtype;
                            // Format subtype name (remove parent prefix for cleaner display)
                            const displayName = st.subtype.replace(t.type + '_', '').replace(/_/g, ' ');
                            subChip.innerHTML = `<span class="dot" style="background: ${color}"></span>${displayName}<span class="count">${st.count.toLocaleString()}</span>`;
                            subChip.onclick = () => selectSubtype(subChip);
                            subtypesContainer.appendChild(subChip);
                        });

                        group.appendChild(subtypesContainer);
                    }

                    container.appendChild(group);
                });
            } catch (err) {
                console.error('Failed to load types:', err);
            }
        }

        // Toggle subtypes visibility
        function toggleSubtypes(expandBtn) {
            const type = expandBtn.dataset.type;
            const subtypesContainer = document.querySelector(`.subtypes-container[data-parent-type="${type}"]`);

            if (subtypesContainer) {
                const isExpanded = subtypesContainer.classList.contains('expanded');
                subtypesContainer.classList.toggle('expanded');
                expandBtn.classList.toggle('expanded');
                expandBtn.innerHTML = isExpanded ? '▶' : '▼';
            }
        }

        // Select a single type (exclusive selection)
        function selectType(chip) {
            const wasActive = chip.classList.contains('active');

            // Deselect all types and subtypes
            document.querySelectorAll('.type-chip, .subtype-chip').forEach(c => c.classList.remove('active'));

            // If wasn't active, select this one
            if (!wasActive) {
                chip.classList.add('active');
                currentFilters.type = chip.dataset.type;
                currentFilters.subtype = null;  // Clear subtype when selecting parent type
            } else {
                currentFilters.type = null;
                currentFilters.subtype = null;
            }

            // Apply filters immediately
            applyFilters();
        }

        // Select a subtype
        function selectSubtype(chip) {
            const wasActive = chip.classList.contains('active');

            // Deselect all types and subtypes
            document.querySelectorAll('.type-chip, .subtype-chip').forEach(c => c.classList.remove('active'));

            // If wasn't active, select this one
            if (!wasActive) {
                chip.classList.add('active');
                currentFilters.type = chip.dataset.type;  // Set parent type too
                currentFilters.subtype = chip.dataset.subtype;
            } else {
                currentFilters.type = null;
                currentFilters.subtype = null;
            }

            // Apply filters immediately
            applyFilters();
        }

        // Handle filter changes
        function onFilterChange() {
            const timeValue = document.getElementById('filter-time').value;
            const regionValue = document.getElementById('filter-region').value;
            const dateRangeGroup = document.getElementById('date-range-group');

            // Region filter
            currentFilters.region = regionValue || null;

            if (timeValue === 'custom') {
                dateRangeGroup.style.display = 'block';
                currentFilters.since = null;
                currentFilters.dateFrom = document.getElementById('filter-date-from').value || null;
                currentFilters.dateTo = document.getElementById('filter-date-to').value || null;
            } else {
                dateRangeGroup.style.display = 'none';
                currentFilters.since = timeValue || null;
                currentFilters.dateFrom = null;
                currentFilters.dateTo = null;
            }

            applyFilters();
        }

        // Apply all filters
        function applyFilters() {
            loadHeatmap();
            if (document.getElementById('show-markers').checked) {
                loadMarkers();
            }
            loadStats();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('filter-region').value = '';
            document.getElementById('filter-time').value = '';
            document.getElementById('filter-date-from').value = '';
            document.getElementById('filter-date-to').value = '';
            document.getElementById('date-range-group').style.display = 'none';
            document.getElementById('user-search').value = '';
            document.getElementById('selected-user').style.display = 'none';
            document.querySelectorAll('.type-chip.active, .subtype-chip.active').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.subtypes-container').forEach(c => c.classList.remove('expanded'));
            document.querySelectorAll('.type-expand').forEach(c => {
                c.classList.remove('expanded');
                c.innerHTML = '▶';
            });

            currentFilters = { type: null, subtype: null, since: null, dateFrom: null, dateTo: null, user: null, region: null };
            applyFilters();
            loadStats();
        }

        // Build URL with current filters
        function buildFilterUrl(baseUrl) {
            let url = baseUrl + '?';
            if (currentFilters.type) url += `type=${currentFilters.type}&`;
            if (currentFilters.subtype) url += `subtype=${encodeURIComponent(currentFilters.subtype)}&`;
            if (currentFilters.since) url += `since=${currentFilters.since}&`;
            if (currentFilters.dateFrom) url += `from=${currentFilters.dateFrom}&`;
            if (currentFilters.dateTo) url += `to=${currentFilters.dateTo}&`;
            if (currentFilters.user) url += `user=${encodeURIComponent(currentFilters.user)}&`;
            if (currentFilters.region) url += `region=${currentFilters.region}&`;
            return url;
        }

        // User search functionality
        async function searchUsers(query) {
            clearTimeout(userSearchTimer);
            userSearchTimer = setTimeout(async () => {
                const dropdown = document.getElementById('user-dropdown');
                if (!query || query.length < 2) {
                    dropdown.style.display = 'none';
                    return;
                }

                try {
                    const res = await fetch(`/api/users?q=${encodeURIComponent(query)}&limit=20`);
                    const users = await res.json();

                    if (users.length > 0) {
                        dropdown.innerHTML = users.map(u =>
                            `<div class="user-option" onclick="selectUser('${u.username.replace(/'/g, "\\'")}')">
                                <span>${u.username}</span>
                                <span class="count">${u.count} events</span>
                            </div>`
                        ).join('');
                        dropdown.style.display = 'block';
                    } else {
                        dropdown.innerHTML = '<div class="user-option" style="color:var(--text-muted)">No users found</div>';
                        dropdown.style.display = 'block';
                    }
                } catch (err) {
                    console.error('User search failed:', err);
                }
            }, 300);
        }

        function showUserDropdown() {
            const input = document.getElementById('user-search');
            if (input.value.length >= 2) {
                document.getElementById('user-dropdown').style.display = 'block';
            }
        }

        function selectUser(username) {
            currentFilters.user = username;

            // Update UI
            document.getElementById('user-search').value = '';
            document.getElementById('user-dropdown').style.display = 'none';
            document.getElementById('selected-user').style.display = 'flex';
            document.getElementById('selected-user-name').textContent = username;

            applyFilters();

            // Update status
            document.getElementById('status-text').textContent = `Tracking user: ${username}`;
        }

        function clearUserFilter() {
            currentFilters.user = null;
            document.getElementById('selected-user').style.display = 'none';
            document.getElementById('user-search').value = '';
            applyFilters();
        }

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#user-search') && !e.target.closest('#user-dropdown')) {
                document.getElementById('user-dropdown').style.display = 'none';
            }
        });

        // Load heatmap data
        async function loadHeatmap() {
            try {
                const url = buildFilterUrl('/api/heatmap');
                const res = await fetch(url);
                const data = await res.json();

                if (heatLayer) {
                    map.removeLayer(heatLayer);
                    heatLayer = null;
                }

                if (data.length > 0) {
                    let maxIntensity = 0;
                    for (let i = 0; i < data.length; i++) {
                        if (data[i][2] > maxIntensity) maxIntensity = data[i][2];
                    }
                    heatLayer = L.heatLayer(data, {
                        radius: 25,
                        blur: 15,
                        maxZoom: 17,
                        max: maxIntensity || 1,
                        minOpacity: 0.3,
                        gradient: {
                            0.0: '#1a1008',
                            0.2: '#3d2608',
                            0.4: '#6b4310',
                            0.6: '#9b6a15',
                            0.8: '#c9901a',
                            1.0: '#e8a817'
                        }
                    });

                    if (document.getElementById('show-heatmap').checked) {
                        heatLayer.addTo(map);
                    }
                }

                // Update status
                let filterInfo = '';
                if (currentFilters.subtype) {
                    filterInfo = ` (${currentFilters.subtype})`;
                } else if (currentFilters.type) {
                    filterInfo = ` (${currentFilters.type})`;
                }
                document.getElementById('status-text').textContent =
                    `Showing ${data.length.toLocaleString()} locations` + filterInfo;
            } catch (err) {
                console.error('Failed to load heatmap:', err);
                document.getElementById('status-text').textContent = 'Heatmap unavailable — data still accessible';
            }
        }

        // Load markers
        async function loadMarkers() {
            try {
                const url = buildFilterUrl('/api/events') + 'limit=500&';
                const res = await fetch(url);
                const events = await res.json();

                markersLayer.clearLayers();

                events.forEach(event => {
                    const color = typeColors[event.type] || '#64748b';
                    const marker = L.circleMarker([event.latitude, event.longitude], {
                        radius: 6,
                        fillColor: color,
                        color: 'rgba(255,255,255,0.3)',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.9
                    });

                    marker.bindPopup(`
                        <div class="event-popup">
                            <h4>${event.type}</h4>
                            <div class="detail"><strong>User:</strong> ${event.username}</div>
                            <div class="detail"><strong>Time:</strong> ${event.timestamp.substring(0, 19)}</div>
                            <div class="detail"><strong>Location:</strong> ${event.latitude.toFixed(4)}, ${event.longitude.toFixed(4)}</div>
                            ${event.subtype ? `<div class="detail"><strong>Subtype:</strong> ${event.subtype}</div>` : ''}
                        </div>
                    `);

                    markersLayer.addLayer(marker);
                });
            } catch (err) {
                console.error('Failed to load markers:', err);
            }
        }

        // Toggle heatmap visibility
        function toggleHeatmap() {
            if (document.getElementById('show-heatmap').checked) {
                if (heatLayer) heatLayer.addTo(map);
                else loadHeatmap();
            } else if (heatLayer) {
                map.removeLayer(heatLayer);
            }
        }

        // Toggle markers visibility
        function toggleMarkers() {
            if (document.getElementById('show-markers').checked) {
                loadMarkers();
            } else {
                markersLayer.clearLayers();
            }
        }

        // Add item to live feed
        function addFeedItem(data) {
            const feed = document.getElementById('feed-items');
            const item = document.createElement('div');
            item.className = 'feed-item new';

            if (data.type === 'new_event' && data.event) {
                const e = data.event;
                const time = new Date(e.timestamp).toLocaleTimeString();
                const color = typeColors[e.report_type] || '#64748b';
                item.innerHTML = `
                    <span class="type" style="color:${color}">${e.report_type}</span>
                    <span class="location">${e.grid_cell || `${e.latitude.toFixed(2)}, ${e.longitude.toFixed(2)}`}</span>
                    <span class="time">${time}</span>
                `;
                item.style.borderLeftColor = color;

                // Auto-follow: teleport to new event location (throttled to once per 10 seconds)
                const autoFollow = document.getElementById('auto-follow');
                if (autoFollow && autoFollow.checked && e.latitude && e.longitude) {
                    const now = Date.now();
                    pendingTeleport = { lat: e.latitude, lng: e.longitude, color: color };

                    if (now - lastTeleportTime >= TELEPORT_INTERVAL) {
                        // Teleport immediately
                        lastTeleportTime = now;
                        map.flyTo([e.latitude, e.longitude], 14, { duration: 0.8 });

                        // Add pulse marker to highlight the new event
                        const pulseMarker = L.circleMarker([e.latitude, e.longitude], {
                            radius: 15,
                            color: color,
                            fillColor: color,
                            fillOpacity: 0.4,
                            weight: 2
                        }).addTo(map);

                        // Animate pulse and remove
                        setTimeout(() => map.removeLayer(pulseMarker), 2500);
                        pendingTeleport = null;
                    }
                }

                // Play sound for new events
                playNotificationSound();

                // Make event items clickable to navigate to location
                if (e.latitude && e.longitude) {
                    item.classList.add('clickable');
                    item.dataset.lat = e.latitude;
                    item.dataset.lng = e.longitude;
                    item.dataset.type = e.report_type;
                    item.title = 'Click to view on map';
                    item.addEventListener('click', () => {
                        const lat = parseFloat(item.dataset.lat);
                        const lng = parseFloat(item.dataset.lng);
                        map.flyTo([lat, lng], 14, { duration: 1 });

                        // Add a temporary marker to highlight the location
                        const markerColor = typeColors[item.dataset.type] || '#00d4ff';
                        const pulseMarker = L.circleMarker([lat, lng], {
                            radius: 12,
                            color: markerColor,
                            fillColor: markerColor,
                            fillOpacity: 0.4,
                            weight: 2
                        }).addTo(map);

                        // Pulse animation then remove
                        setTimeout(() => map.removeLayer(pulseMarker), 3000);
                    });
                }
            } else if (data.type === 'status') {
                // Skip status items with 0 alerts and 0 new events
                if (data.alerts_found === 0 && data.new_events === 0) {
                    return;
                }

                const color = typeColors[data.event_types?.[0]] || '#00d4ff';
                item.innerHTML = `
                    <span class="type" style="color:var(--text-muted)">SCAN</span>
                    <span class="location">${data.cell_name} (${data.country})</span>
                    <span class="time">${data.cell_idx}/${data.total_cells} • +${data.new_events}</span>
                `;
                item.style.borderLeftColor = data.new_events > 0 ? 'var(--primary)' : 'var(--border)';

                // Update status bar
                document.getElementById('status-text').textContent =
                    `[${data.region.toUpperCase()}] ${data.cell_name} (${data.country}) • ${data.alerts_found} alerts, +${data.new_events} new`;
            } else {
                return; // Skip heartbeats and unknown types
            }

            // Insert at top
            feed.insertBefore(item, feed.firstChild);

            // Remove 'new' class after animation
            setTimeout(() => item.classList.remove('new'), 1000);

            // Keep only last 50 items
            while (feed.children.length > 50) {
                feed.removeChild(feed.lastChild);
            }
        }

        // Connect to SSE stream
        function connectSSE() {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connecting...';

            const eventSource = new EventSource('/api/stream');

            eventSource.onopen = () => {
                statusEl.textContent = 'Connected';
            };

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'connected') {
                        statusEl.textContent = 'Live';
                    } else if (data.type === 'heartbeat') {
                        // Ignore heartbeats
                    } else if (data.type === 'new_event') {
                        addFeedItem(data);
                        // Refresh stats periodically
                        loadStats();
                    } else if (data.type === 'status') {
                        addFeedItem(data);
                    }
                } catch (err) {
                    console.error('SSE parse error:', err);
                }
            };

            eventSource.onerror = () => {
                statusEl.textContent = 'Reconnecting...';
                eventSource.close();
                // Reconnect after 5 seconds
                setTimeout(connectSSE, 5000);
            };
        }

        // Load recent activity on startup
        async function loadRecentActivity() {
            try {
                const res = await fetch('/api/recent-activity');
                const events = await res.json();

                // Add last 10 events to feed (reversed so newest is on top)
                events.slice(0, 10).forEach(e => {
                    addFeedItem({
                        type: 'new_event',
                        event: {
                            ...e,
                            report_type: e.type
                        }
                    });
                });
            } catch (err) {
                console.error('Failed to load recent activity:', err);
            }
        }

        // Load leaderboard
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard?limit=10');
                const users = await res.json();
                const container = document.getElementById('leaderboard');

                container.innerHTML = users.map(user => {
                    let rankClass = 'normal';
                    if (user.rank === 1) rankClass = 'gold';
                    else if (user.rank === 2) rankClass = 'silver';
                    else if (user.rank === 3) rankClass = 'bronze';

                    return `
                        <div class="leaderboard-item" onclick="selectUser('${user.username.replace(/'/g, "\\'")}')">
                            <span class="leaderboard-rank ${rankClass}">${user.rank}</span>
                            <span class="leaderboard-username">${user.username}</span>
                            <span class="leaderboard-count">${user.count.toLocaleString()}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load leaderboard:', err);
            }
        }

        // Initialize
        loadStats().then(() => {
            const total = document.getElementById('stat-total').textContent;
            if (total && total !== '—') {
                document.getElementById('status-text').textContent = `${total} events loaded`;
            }
        });
        loadTypes();
        loadLeaderboard();
        loadHeatmap();
        loadRecentActivity();
        connectSSE();

        // Refresh stats and leaderboard every 60 seconds
        setInterval(() => {
            loadStats();
            loadLeaderboard();
        }, 60000);

        // Process pending teleports every 10 seconds
        setInterval(() => {
            const autoFollow = document.getElementById('auto-follow');
            if (autoFollow && autoFollow.checked && pendingTeleport) {
                const now = Date.now();
                if (now - lastTeleportTime >= TELEPORT_INTERVAL) {
                    lastTeleportTime = now;
                    map.flyTo([pendingTeleport.lat, pendingTeleport.lng], 14, { duration: 0.8 });

                    // Add pulse marker
                    const pulseMarker = L.circleMarker([pendingTeleport.lat, pendingTeleport.lng], {
                        radius: 15,
                        color: pendingTeleport.color,
                        fillColor: pendingTeleport.color,
                        fillOpacity: 0.4,
                        weight: 2
                    }).addTo(map);
                    setTimeout(() => map.removeLayer(pulseMarker), 2500);

                    pendingTeleport = null;
                }
            }
        }, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts when typing in inputs
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            switch(e.key.toLowerCase()) {
                case 'h': // Toggle heatmap
                    const heatmapCheckbox = document.getElementById('show-heatmap');
                    heatmapCheckbox.checked = !heatmapCheckbox.checked;
                    toggleHeatmap();
                    break;
                case 'm': // Toggle markers
                    const markersCheckbox = document.getElementById('show-markers');
                    markersCheckbox.checked = !markersCheckbox.checked;
                    toggleMarkers();
                    break;
                case 'f': // Toggle auto-follow
                    const followCheckbox = document.getElementById('auto-follow');
                    followCheckbox.checked = !followCheckbox.checked;
                    break;
                case 's': // Toggle sound
                    const soundCheckbox = document.getElementById('sound-enabled');
                    soundCheckbox.checked = !soundCheckbox.checked;
                    break;
                case 'r': // Reset filters
                    resetFilters();
                    break;
                case 'escape': // Toggle sidebar
                    toggleSidebar();
                    break;
            }
        });
    </script>
</body>
</html>
