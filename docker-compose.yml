# Waze OSINT Tracker — Oracle 26ai Free Database
# Usage: docker compose up -d
#
# Default credentials (override via .env file):
#   ORACLE_PWD — SYS/SYSTEM password (default: WazeIntel2026)
#   ORACLE_PORT — listener port (default: 1521)

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: waze-oracle-26ai
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-WazeIntel2026}
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/init_oracle.sql:/opt/oracle/scripts/startup/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s sys/${ORACLE_PWD:-WazeIntel2026}@localhost:1521/FREEPDB1 as sysdba || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  oracle-data:
